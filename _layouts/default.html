<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>
    {% if page.description or site.description %}
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    {% endif %}
    {% seo %}
    <link rel="icon" href="{{ '/assets/lotus-bullet.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HealthAndBeautyBusiness",
      "name": "Lotus Moments",
      "description": "Holistische massagepraktijk",
      "url": "https://lotusmoments.nl",
      "email": "info@lotusmoments.nl"
    }
    </script>
  </head>
  <body>
    {% include header.html %}
    <main class="content" aria-label="Inhoud">
      {{ content }}
    </main>
    {% include footer.html %}
    {% if jekyll.environment == "production" %}
    <script data-goatcounter="{{ site.goatcounter_url }}"
            async src="//gc.zgo.at/count.js"></script>
    {% endif %}
  </body>
</html>
