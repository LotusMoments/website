- naam: Lotus Moment sessie
  tagline: Holistische massage — lichaam & geest
  duur: 70 min
  prijs: "€ 48"
  status: beschikbaar
  tarief: "Introductietarief: tijdelijk verlaagd tarief van 48 EUR per sessie."
  omschrijving: >
    Lotus Moment – een holistische massage waarin lichaam en geest samenkomen.
    Tijdens de sessie geef je jezelf de ruimte om te voelen, te vertragen en bewust
    aanwezig te zijn bij wat er nu in je lichaam gebeurt.
  fases:
    - titel: Aankomen & intake
      duur: 10 min
      omschrijving: We stemmen kort af hoe het met je gaat, wat je lichaam aangeeft en waar jouw behoefte ligt.
    - titel: Massage
      duur: 55 min
      omschrijving: Een massage op maat met warme olie, aandacht voor ademhaling en diepe ontspanning van lichaam en geest.
    - titel: Nabespreken & afronden
      duur: 5 min
      omschrijving: Neem even de tijd om na te voelen en rustig terug te komen voordat je weer verder gaat met je dag.

