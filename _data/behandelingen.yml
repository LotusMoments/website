- naam: Lotus Moment sessie
  tagline: Holistische massage voor lichaam en geest
  duur: 70 min
  prijs: "€ 48"
  status: beschikbaar
  tarief: "Introductietarief: tijdelijk verlaagd tarief van 48 EUR per sessie."
  omschrijving: >
    Lotus Moment – een holistische massage waarin lichaam en geest samenkomen.
    Tijdens de sessie geef je jezelf de ruimte om te voelen, te vertragen en bewust
    aanwezig te zijn bij wat er nu in je lichaam gebeurt.
  fases:
    - titel: Aankomen
      omschrijving: We stemmen kort af hoe het met je gaat, wat je lichaam aangeeft en waar jouw behoefte ligt.
    - titel: De massage
      omschrijving: Een massage op maat met warme olie, aandacht voor de ademhaling en ruimte voor wat het lichaam te vertellen heeft.
    - titel: Navoelen
      omschrijving: Neem even de tijd om te voelen wat er in je lichaam is verschoven, en kom rustig terug voordat je weer verder gaat.

- naam: Er is meer onderweg
